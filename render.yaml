services:
  - type: web
    name: world-cup-2026-tracker
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: OPENCODE_ZEN_API_KEY
        sync: false
